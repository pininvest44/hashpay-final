<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bulk STK Push</title>
<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px}
textarea,input,button{width:100%;padding:10px;margin:10px 0}
pre{background:#f4f4f4;padding:10px;overflow:auto}
</style>
</head>
<body>
<h1>HashBack Bulk STK Push</h1>
<input id="amount" placeholder="Amount">
<input id="reference" placeholder="Reference">
<textarea id="numbers" rows="10" placeholder="One phone number per line"></textarea>
<button onclick="send()">Send STK Pushes</button>
<pre id="output"></pre>

<script>
async function send(){
 const numbers=document.getElementById('numbers').value
  .split('\n').map(x=>x.trim()).filter(Boolean);

 const res=await fetch('/api/bulk-stk',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     numbers,
     amount:document.getElementById('amount').value,
     reference:document.getElementById('reference').value
   })
 });

 document.getElementById('output').textContent =
   JSON.stringify(await res.json(), null, 2);
}
</script>
</body>
</html>
